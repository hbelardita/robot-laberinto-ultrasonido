; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino

; Servo is bundled with the Arduino AVR core — explicitly listed so PlatformIO's
; LDF resolves Servo.h without requiring a separate registry download.
lib_deps =
    arduino-libraries/Servo

; Deep+ mode: resolves headers inside lib/ subdirectories automatically.
; This lets MotorDriver, UltrasonicScanner, MazeSolver find Config.h via include/.
lib_ldf_mode = deep+

; Add project include/ dir to the compiler search path
build_flags =
    -I include
    -std=gnu++11
    -fno-lto

; Print detailed memory usage after build (flash + SRAM breakdown)
build_unflags = -std=gnu++0x

; Serial monitor interactive debug mode
monitor_echo = yes
monitor_filters = send_on_enter
